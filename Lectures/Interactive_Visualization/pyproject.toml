numpy = "^1.26.4"
matplotlib = "^3.8.4"
opencv-python = "^4.9.0.80"
ipykernel = "^6.29.5"
dotenv = "^0.9.9"
bokeh = ">=3.5.0"
dash = "2.18.0"
