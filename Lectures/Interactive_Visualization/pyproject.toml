dash-html-components = "^2.0.0"
sketch = "^0.5.2"
nbformat = ">=4.2.0"
jupyterlab-dash = "^0.1.0a3"
holoviews = "^1.20.2"
panel = "^1.6.2"
geoviews = "^1.14.0"
hvplot = "^0.11.2"
colorcet = "^3.1.0"
datashader = "^0.17.0"
bokeh-sampledata = "^2024.2"
